<h1 class='title'>Ｄ００４－３ ＤＮＡメチル化検出検査</h1>
<div id='content'>
<p><b>2,500点</b></p>
<div id='tuti'>
<h2 class='title'>通知</h2>
<p>ＤＮＡメチル化検出検査は、ＲＡＳ遺伝子野生型の治癒切除不能な進行・再発の結腸・直腸癌の患者において、当該疾患の治療薬の選択の補助に用いるものとして薬事承認又は認証を得ている体外診断用医薬品を用いて、リアルタイムＰＣＲ法により、腫瘍組織から抽出した検体中のＤＮＡメチル化状態の検出を行った場合に、患者１人につき１回に限り算定する。</p>
