<!-- 001686832.pdf:484 te.txt:20247 --><p style='margin-left:2.5em;text-indent:-2.5em'>(１) カテーテル留置中に薬液膀胱内注入を行った場合は、１日につき、薬液膀胱内注入によ<br>り算定する。</p>
<!-- 001686832.pdf:484 te.txt:20249 --><p style='margin-left:2.5em;text-indent:-2.5em'>(２) 膀胱洗浄、留置カテーテル設置、導尿（尿道拡張を要するもの）、後部尿道洗浄（ウル<br>ツマン）又は薬液膀胱内注入を同一日に行った場合には、主たるものの所定点数により算定する。</p>
