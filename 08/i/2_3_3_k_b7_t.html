<p class='title'>令和08年医科診療報酬点数表 / 第２章 特掲診療料 / 第３部 検査 / 第３節 生体検査料 / 区分  / （眼科学的検査） </p>
<h1 class='title'>通則 </h1>
<div id='content'>
<!-- 001686842.pdf:203 ke.txt:10507 --><p style='margin-left:1.5em;text-indent:-1.5em'>１ コンタクトレンズの装用を目的に受診した患者に対して眼科学的検査を行った場合は、区分<br>番号<a href='D282-3.html'>Ｄ２８２－３</a>に掲げるコンタクトレンズ検査料のみ算定する。</p>
<!-- 001686842.pdf:203 ke.txt:10509 --><p style='margin-left:1.5em;text-indent:-1.5em'>２ 近視の進行抑制を目的として診療を行い当該目的に係る効能又は効果を有する医薬品を投与<br>している患者に対して眼科学的検査を行った場合は、年２回に限り算定する。この場合において、１回の受診において複数の検査を行った場合は、２種類を限度として算定する。</p>
