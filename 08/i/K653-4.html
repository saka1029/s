<!-- 001686832.pdf:653 te.txt:27241 --><p style='margin-left:2.5em;text-indent:-2.5em'>(１) 内視鏡的表在性胃悪性腫瘍光線力学療法は、タラポルフィンナトリウムを投与した患者<br>に対し半導体レーザー（波長664ｎｍ）及を使用した場合など、保険適用された薬剤、機器を用いて行った場合に限り算定できる。</p>
<!-- 001686832.pdf:653 te.txt:27244 --><p style='margin-left:2.5em;text-indent:-2.5em'>(２) マイクロ波凝固療法を実施した場合における当該療法に係る費用は、所定点数に含まれ<br>る。</p>
