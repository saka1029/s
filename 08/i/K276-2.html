<div id='content'>
<p><b>10,000点</b></p>
<div id='tuti'>
<h2 class='title'>通知</h2>
<p>経皮的選択的眼動脈注入術は、網膜芽細胞腫の患者に対し、眼動脈に経皮的にカテーテルを挿入し、抗悪性腫瘍剤を投与した場合に算定する。なお、実施に当たっては、関係学会の定める診療に関する指針を遵守すること。</p>
