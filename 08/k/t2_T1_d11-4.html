<h1 class='title'>第11の４ 認知症専門診断管理料</h1>
<div id='content'>
<!-- 001686837.pdf:98 te.txt:31233 --><p style='margin-left:1.5em;text-indent:-1.5em'>１ 認知症専門診断管理料に関する施設基準「認知症疾患医療センター運営事業実施要綱について」（平成 26 年７月９日老発 0709 第３号)の別添２認知症疾患医療センター運営事業実施要綱における認知症疾患医療センターであること。</p>
<!-- 001686837.pdf:98 te.txt:31237 --><p style='margin-left:1.5em;text-indent:-1.5em'>２ 届出に関する事項認知症専門診断管理料の施設基準に係る取扱いについては、当該基準を満たしていればよく、特に地方厚生（支）局長に対して、届出を行う必要はないこと。</p>
