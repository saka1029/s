<h1 class='title'>第29の５ 有床義歯咀嚼機能検査</h1>
<div id='content'>
<!-- 001686837.pdf:164 te.txt:33756 --><p style='margin-left:1.5em;text-indent:-1.5em'>１ 有床義歯咀嚼機能検査に関する施設基準</p>
<!-- 001686837.pdf:164 te.txt:33757 --><p style='margin-left:4.5em;text-indent:-2.5em'>(１) 歯科補綴治療に係る専門の知識及び３年以上の経験を有する歯科医師が１名以上配置さ<br>れていること。</p>
<!-- 001686837.pdf:164 te.txt:33759 --><p style='margin-left:4.5em;text-indent:-2.5em'>(２) 当該保険医療機関内に歯科用下顎運動測定器（非接触型）を備えていること。</p>
<!-- 001686837.pdf:164 te.txt:33760 --><p style='margin-left:1.5em;text-indent:-1.5em'>２ 届出に関する事項<br>有床義歯咀嚼機能検査の施設基準に係る届出は、<a href='pdf/T2-Y38-1-2.pdf'>別添２の様式 38 の１の２</a>を用いること。なお、有床義歯咀嚼機能検査のうち、１のロ及び２のロについては、特に地方厚生(支)局長に対して、届出を行う必要はないこと。</p>
