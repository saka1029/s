<p class='title'>令和08年施設基準(通知) / 〇特掲診療料の施設基準等  / 別添１ 特掲診療料の施設基準等</p>
<h1 class='title'>第90 調剤基本料の注２に規定する保険薬局</h1>
<div id='content'>
<!-- 001686837.pdf:369 te.txt:41959 --><p style='margin-left:1.5em;text-indent:-1.5em'>１ 対象となるのは、地方厚生（支）局長に対して、調剤基本料に係る届出を行っていない保険薬<br>局であること。</p>
<!-- 001686837.pdf:369 te.txt:41961 --><p style='margin-left:1.5em;text-indent:-1.5em'>２ １の規定は、調剤基本料に係る届出を行っている保険薬局について、当該届出の内容が実態と<br>異なることが判明した場合であって、地方厚生局による適時調査が実施された場合には適用するものではないこと。なお、当該届出が故意又は重大な過失により虚偽であった場合については、この限りでない。</p>
