<p class='title'>令和08年施設基準(告示) / 基本診療料の施設基準等 </p>
<h1 class='title'>第十一 情報通信機器等を用いた看護職員及び看護補助者の業務の効率化について厚生労働大臣が定める施設基準等</h1>
<div id='content'>
<!-- 001675854.pdf:294 ke.txt:4102 --><p style='margin-left:1.5em;text-indent:-1.5em'>一 情報通信機器等を用いた看護職員及び看護補助者の業務の効率化について、十分な体制が確保されて<br>いること。</p>
<!-- 001675854.pdf:294 ke.txt:4104 --><p style='margin-left:1.5em;text-indent:-1.5em'>二 一日に看護を行う看護職員及び看護補助を行う看護補助者の数並びに看護師及び准看護師の数に対す<br>る看護師の比率が、第五、第九及び第十に定める基準の九割以上であること。</p>
<!-- 001675854.pdf:294 ke.txt:4106 --><p style='margin-left:1.5em;text-indent:-1.5em'>三 二を除き、第五、第九及び第十の規定を全て満たしていること。</p>
<!-- 001675854.pdf:294 ke.txt:4107 --><p style='margin-left:1.5em;text-indent:-1.5em'>四 <a href='k1_b_16.html'>別表第十六</a>に掲げる入院料を算定する病棟であること。</p>
