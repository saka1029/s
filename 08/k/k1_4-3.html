<p class='title'>令和08年施設基準(告示) / 基本診療料の施設基準等 </p>
<h1 class='title'>第四の三 医科点数表第一章第二部入院料等通則第11</h1>
<div id='content'>
<p><b>号及び歯科点数表第一章第二部入院料等通則第９号</b></p>
<p>に掲げる厚生労働大臣が定める基準</p>
<!-- 001675854.pdf:29 ke.txt:406 --><p style='margin-left:1.5em;text-indent:-1.5em'>一 次のいずれかに該当する保険医療機関であること。</p>
<!-- 001675854.pdf:29 ke.txt:407 --><p style='margin-left:4.0em;text-indent:-2.0em'>(1) 令和八年三月三十一日時点において、入院ベースアップ評価料の届出を行っていること。</p>
<!-- 001675854.pdf:30 ke.txt:409 --><p style='margin-left:4.0em;text-indent:-2.0em'>(2) 令和六年三月と比較して、継続的に賃上げを行っている保険医療機関であること。</p>
<!-- 001675854.pdf:30 ke.txt:410 --><p style='margin-left:4.0em;text-indent:-2.0em'>(3) 令和八年六月一日以降に新規開設した保険医療機関であること。</p>
