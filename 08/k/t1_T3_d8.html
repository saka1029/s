<div id='content'>
<!-- 001686836.pdf:115 te.txt:4665 --><p style='margin-left:1.5em;text-indent:-1.5em'>１ 一般職の職員の給与に関する法律（昭和25年法律第 95号）第11 条の３第１項に規定する人事院規則で定める地域及び当該地域に準じる地域は、別紙１のとおりであること。</p>
