<h1 class='title'>第80の２の２ 無菌的分割製剤作成加算の施設基準</h1>
<div id='content'>
<!-- 001686837.pdf:331 te.txt:40420 --><p style='margin-left:1.5em;text-indent:-1.5em'>１ 無菌的分割製剤作成加算に関する施設基準<br>輸血管理料Ⅰ又は輸血管理料Ⅱを届け出ていること。</p>
<!-- 001686837.pdf:331 te.txt:40422 --><p style='margin-left:1.5em;text-indent:-1.5em'>２ 届出に関する事項<br>無菌的分割製剤作成加算に関する施設基準については、輸血管理料Ⅰ又は輸血管理料Ⅱの届出を行っていればよく、無菌的分割製剤作成加算として特に地方厚生（支）局長に対して、届出を行う必要はないこと。</p>
