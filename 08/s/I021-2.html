<h2 class='title'>通知</h2>
<p></p>
<!-- 001686833.pdf:99 te.txt:4094 --><p style='margin-left:2.5em;text-indent:-2.5em'>(１) 歯の破折片除去とは、一部残存した歯の破折片を非観血的あるいは簡単な切開で除去<br>を行った場合（う蝕除去に伴うものを除く。）に歯数に応じて算定する。(２)浸潤麻酔の下に破折片を除去した場合は、<a href='K001.html'>Ｋ００１</a>に掲げる浸潤麻酔料及び使用麻酔薬剤料のそれぞれを算定する。</p>
