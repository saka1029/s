<div id='content'>
<!-- 001689076.pdf:88 ke.txt:3615 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 20 令和８年６月以降、長期収載品の選定療養に係る特別の料金について、<br>先発医薬品と後発医薬品の薬価の差額の２分の１相当の徴収となる変更<br>を踏まえ、過去に長期収載品の選定療養に関する説明を既に行っている患<br>者に対し、当該変更について改めて説明を実施した場合、特定薬剤管理指<br>導加算３（ロ）を算定することは可能か。<br></p></div>
<!-- 001689076.pdf:88 ke.txt:3620 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 自己負担額が変更となる医薬品に関して、最初に処方された１回に限り算<br>定可能。<br></p>
