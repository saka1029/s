<div id='content'>
<!-- 001716069.pdf:10 ke.txt:6761 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問４ ３次元プリント有床義歯の製作に用いる装置は、医療機器の一般的名称が「歯科技工室設置型コンピュータ支援設計・製造ユニット」と「歯科技工用重合装置」であって、かつ、３次元プリント有床義歯の製作を目的として保険適用されている装置を用いた場合のみ算定できるのか。</p></div>
<!-- 001716069.pdf:10 ke.txt:6765 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） そのとおり。なお、当該医療機器の保険適用の有無については、製造販売業者に確認すること。</p>
