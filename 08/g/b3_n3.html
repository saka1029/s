<div id='content'>
<!-- 001678310.pdf:18 ke.txt:560 --><div class='rbox'><pre>問３ 重症度、医療・看護必要度Ⅱを用いた評価を行うことが困難であること
     に正当な理由がある場合に「主に歯科の入院患者を受け入れる病棟」が追
     加されたが、具体的にはどのような病棟か。
</pre></div>
<!-- 001678310.pdf:18 ke.txt:563 --><pre>（答） 評価を行う入院患者のうち、歯科の患者の割合が８割以上の病棟が該当す
       る。なお、「主に歯科の入院患者を受け入れる病棟の重症度、医療・看護必
       要度の取扱いについて」（令和７年８月７日付け事務連絡）を参照すること。
</pre>
