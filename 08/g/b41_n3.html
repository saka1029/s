<div id='content'>
<!-- 001716069.pdf:10 ke.txt:6752 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問３ 令和８年度診療報酬改定において、画像診断の診断料及び撮影料の２枚目以降の算定方法の取扱いが見直されたが、歯科矯正に係る歯科矯正セファログラムと歯科パノラマ断層撮影を行った場合も同様の取扱いとなるのか。</p></div>
<!-- 001716069.pdf:10 ke.txt:6756 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 同様の取扱いとなる。なお、これに伴い、「疑義解釈資料の送付について」（平成 20 年３月 28 日事務連絡）別添２の問 27 及び「疑義解釈資料の送付について（その３）」（平成 20 年７月 10 日事務連絡）別添２の問 10 は廃止する。</p>
