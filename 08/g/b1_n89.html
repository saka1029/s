<!-- 001689076.pdf:35 ke.txt:1949 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 120 「Ｋ０８２－８」人工膝関節置換術（手術支援装置を用いるもの）における「術中に光学的に計測した術野及び手術器具の位置関係をリアルタイムに表示し、寛骨臼及び大腿骨の切削を支援する手術支援装置」には何が含まれるか。</p></div>
<!-- 001689076.pdf:36 ke.txt:1955 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 「特定診療報酬算定医療機器の定義等について」（令和８年３月５日保医発 0305 第３号）に規定する定義に適合する医療機器が該当する。</p>
