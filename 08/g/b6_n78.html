<div id='content'>
<!-- 001689076.pdf:37 ke.txt:1989 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 126 特定保険医療材料の機能区分「016」体表面用電場電極（在宅医療の部）及び「195」体表面用電場電極（在宅医療の部以外）の「(２)  非小細胞肺癌用」の算定留意事項における「関連学会の定める診療に関する指針」とは、具体的には何を指すのか。</p></div>
<!-- 001689076.pdf:37 ke.txt:1993 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本呼吸器学会、日本呼吸器外科学会、日本肺癌学会、日本臨床腫瘍学会の「オプチューンルア適正使用指針第１版」を指す。</p>
