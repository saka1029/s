<!-- 001689076.pdf:38 ke.txt:2047 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 135 特定保険医療材料の機能区分「164」椎体形成用材料セットにおける「関<br>連学会の定める適正使用指針」とは、具体的に何を指すのか。<br></p></div>
<!-- 001689076.pdf:38 ke.txt:2049 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本脊椎脊髄病学会・日本脊髄外科学会合同椎体形成術ワ<br>ーキンググループの「経皮的後弯矯正術（BKP、VBS）適正使用指針（第１<br>版）」を指す。<br></p>
