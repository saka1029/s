<h1 class='title'>調剤報酬点数表関係<br>【届出関係】</h1>
<div id='content'>
<!-- 001689076.pdf:89 ke.txt:3647 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 24 令和８年度診療報酬改定の内容を適用する前の、後発医薬品使用体制<br>加算等の施設基準においては、前月までの実績を用いて届け出ることとさ<br>れているが、令和８年５月１日に、５月に適用する後発医薬品使用体制加<br>算等の届出をする場合、４月実績のカットオフ値はどのように算出すれば<br>よいか。<br></p></div>
<!-- 001689076.pdf:89 ke.txt:3652 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 令和８年５月１日に、５月に適用する後発医薬品使用体制加算等の届出を<br>する場合に限り、カットオフ値の算出については令和８年３月までの実績<br>を用いることとし、４月実績は用いないこと。<br>（別添６）<br></p>
