<div id='content'>
<!-- 001698587.pdf:2 ke.txt:4577 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問２ 「Ａ２２１-３」産科管理加算の施設基準において、「助産、産科患者・新生児のケア及び母子保健や福祉に関する事業等との地域連携に係る業務に従事した経験を５年以上有し」とあるが、地域連携業務を担う部門等において業務に従事した経験が必要となるか。</p></div>
<!-- 001698587.pdf:2 ke.txt:4581 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 必ずしも地域連携業務を担う部門等における業務経験が必要ではない。例えば、助産や産科患者・新生児のケアに当たって、母子保健事業や福祉関係機関等の担当者に自ら又は地域連携業務を担う部門を介して情報共有を行う等の連携を行うことが業務に含まれている場合も該当する。</p>
</div>
