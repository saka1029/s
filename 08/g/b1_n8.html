<!-- 001678310.pdf:6 ke.txt:175 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 13 看護・多職種協働加算は病棟ごとに届け出るのか。保険医療機関内の急性期病院Ｂ一般入院料又は急性期一般入院料４を算定する病棟全体で届け出るのか。</p></div>
<!-- 001678310.pdf:6 ke.txt:178 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 保険医療機関内の急性期病院Ｂ一般入院料又は急性期一般入院料４を算定する一般病棟全体で届け出ること。</p>
