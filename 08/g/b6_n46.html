<div id='content'>
<!-- 001689076.pdf:28 ke.txt:1680 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 85 「Ｉ００２」通院・在宅精神療法の「注13」に関する施設基準において、「令和８年５月 31 日時点において、精神医療に 20 年以上従事していること。」とあるが、具体的にはどのようなものが「精神医療に従事していること」に該当するか。</p></div>
<!-- 001689076.pdf:28 ke.txt:1684 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 常態として、以下の業務に従事している期間が該当する。・保険医療機関において主として精神科の診療業務を行っている・精神保健福祉センター等の行政機関において主として精神保健医療にかかる業務に従事している・これらの業務と精神保健医療に関する教育・研究等の業務を兼務している</p>
