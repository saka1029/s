<!-- 001678310.pdf:6 ke.txt:169 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 12 「Ａ１００」急性期病院一般入院基本料の施設基準における「看護師長又はこれと同等以上の職に従事した経験を５年以上有し、次に掲げる所定の研修（修了証が交付されるものに限る。）」とはどのような研修か。</p></div>
<!-- 001678310.pdf:6 ke.txt:172 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本看護協会認定看護管理者教育課程「サードレベル」を指す。</p>
