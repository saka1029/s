<!-- 001689076.pdf:82 ke.txt:3437 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 10 「別の原因で病変が独立して生じており、組織学的形態が異なる場合<br>は、２回を限度として算定する。」としているが、上下若しくは左右の同<br>一の組織に病変が生じている場合はそれぞれ算定可能か。<br></p></div>
<!-- 001689076.pdf:82 ke.txt:3440 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） それぞれ病理診断が必要な場合は、２回を限度として算定可能。<br></p>
