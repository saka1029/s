<div id='content'>
<!-- 001716069.pdf:10 ke.txt:6768 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問５ 施設基準において、「都道府県等と連携が図られている保険医療機関であること。ただし、歯科診療所においては、歯科を標榜する病院との連携が図られていること。」とあるが、①歯科診療所は、都道府県等と病院の両方と連携する必要があるのか。②都道府県等との連携について、連携内容についての要件はあるのか。</p></div>
<!-- 001716069.pdf:11 ke.txt:6775 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） ①そのとおり。②具体的な連携内容は規定していないが、届出を行う保険医療機関と都道府県等との間で、何らかの連携体制が構築されている必要がある。</p>
