<div id='content'>
<!-- 001678310.pdf:18 ke.txt:545 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問１ 「Ａ０００」初診料の注１の施設基準に規定する、新興感染症に対する対策の研修について、「（抗菌薬の適正使用を含む。）」が追加されたが、どのような内容の研修が該当するのか。</p></div>
<!-- 001678310.pdf:18 ke.txt:548 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 抗菌薬の適正使用に関する研修の内容は、「抗微生物薬適正使用の手引き第四版  歯科編」（厚生労働省健康・生活衛生局感染対策部感染症対策課・医政局歯科保健課）を参考にすること。なお、令和８年５月 31 日までに受講する研修については、当該内容が含まれていなくてもよいが、令和８年６月１日以降に受講する研修には、本内容が含まれている必要がある。</p>
