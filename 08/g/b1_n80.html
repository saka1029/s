<!-- 001689076.pdf:34 ke.txt:1896 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 111 「Ｋ６０９－３」経頸動脈的頸動脈ステント留置術における「関連学会<br>の定める基準等」とは、具体的に何を指すのか。<br></p></div>
<!-- 001689076.pdf:34 ke.txt:1898 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本脳卒中学会、日本脳神経外科学会、日本脳神経血管内<br>治療学会、日本血管外科学会の「経頚動脈ステント留置システム  適正使<br>用指針」を指す。<br></p>
