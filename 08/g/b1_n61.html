<h1 class='title'>医科診療報酬点数表関係<br>【精神科急性期治療病棟入院料】</h1>
<div id='content'>
<!-- 001689076.pdf:27 ke.txt:1653 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 82 「Ａ３１１－２」精神科急性期治療病棟入院料の施設基準において、「同一保険医療機関内に精神科急性期治療病棟入院料１を算定すべき病棟と精神科急性期治療病棟入院料２を算定すべき病棟が混在することはできない。」とあるが、精神科急性期治療病棟入院料１を届け出る病棟を有する保険医療機関において、令和８年３月 31 日において現に令和８年度診療報酬改定前の医科点数表における精神科地域包括ケア病棟入院料に係る届出を行っている病棟が、精神科急性期治療病棟入院料２を届け出ることは可能か。</p></div>
<!-- 001689076.pdf:27 ke.txt:1661 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 令和８年９月30日までの間に限り可能。</p>
