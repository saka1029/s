<div id='content'>
<!-- 001678310.pdf:12 ke.txt:404 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 39 令和８年度診療報酬改定にて休日リハビリテーション加算が新設された<br>が、令和８年５月31日以前に入院し、同年６月１日以降も入院している患<br>者に対して当該加算を算定する場合、起算日はどのように考えればよいか。<br></p></div>
<!-- 001678310.pdf:12 ke.txt:407 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 休日リハビリテーション加算の起算日に相当する日付が令和８年５月31<br>日以前であっても、当該日付を起算日と考え、６月１日以降、算定要件を<br>満たす日に算定可能である。<br></p>
