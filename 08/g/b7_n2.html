<h1 class='title'>医科・歯科診療報酬点数表関係<br>【物価対応料】</h1>
<div id='content'>
<!-- 001712853.pdf:11 ke.txt:6401 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問２ 物価対応料について、「入院物価対応料は、当該保険医療機関において、<br>第１章第２部第１節入院基本料、第３節特定入院料又は第４節短期滞在手<br>術等基本料(「Ａ４００」の「１」短期滞在手術等基本料１を除く。)を算<br>定している患者について、１日につき１回に限り算定できる。」とあるが、<br>短期滞在手術等基本料３における算定はどのように考えればよいか。<br></p></div>
<!-- 001712853.pdf:11 ke.txt:6406 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 短期滞在手術等基本料３を算定する場合、物価対応料について、当該基本<br>料を算定した日において、１回に限り算定する。なお、歯科入院物価対応料<br>についても同様の取り扱いとする。<br>（別添３）<br></p>
</div>
