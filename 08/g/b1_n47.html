<!-- 001689076.pdf:19 ke.txt:1364 --><div class='rbox'><pre>問 60 「Ｂ００５－11」遠隔連携診療料の「注１」及び「注３」について、対
      象患者として、難病の患者に対する医療等に関する法律第５条第１項に規定
      する指定難病の患者とあるが、指定難病の患者とは、同法第７条第４項に規
      定する医療受給者証が交付されている患者（同条第１項各号に規定する特定
      医療費の支給認定に係る基準を満たすものとして診断を受けたものを含
      む。）を指すのか。
</pre></div>
<!-- 001689076.pdf:20 ke.txt:1372 --><pre>（答） 医療受給者証の交付の有無にかかわらず、指定難病と診断されていれば
       対象となる。
</pre>
