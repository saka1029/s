<!-- 001678310.pdf:10 ke.txt:329 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 30 「Ａ３０８」回復期リハビリテーション病棟入院料の「注４」に規定する回復期リハビリテーション強化体制加算の届出は、回復期リハビリテーション病棟入院料１を算定する病棟全体で届け出るのか。</p></div>
<!-- 001678310.pdf:10 ke.txt:332 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） そのとおり。保険医療機関内の回復期リハビリテーション病棟入院料１を届け出る病棟全体で届出を行うこと。</p>
