<h1 class='title'>看護職員処遇改善評価料及びベースアップ評価料関係<br>【調剤ベースアップ評価料】</h1>
<div id='content'>
<!-- 001689076.pdf:45 ke.txt:2285 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 10 特掲施設基準通知の第109  調剤ベースアップ評価料について、出向元が賃金を支払って出向先の保険薬局に勤務する対象職員の賃金改善を実施するに当たり、どのように賃金改善報告書を作成すればよいか。</p></div>
<!-- 001689076.pdf:45 ke.txt:2288 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 出向先の保険薬局が出向元と協議して、当該対象職員の賃金及び賃金改善の額を把握し、出向先における賃金改善の実績に含めてよい。なお、出向先がベースアップ評価料で得た収入については、出向先から出向元に支払うなど、合議で適切に精算することとなる。（別添３）</p>
