<div id='content'>
<!-- 001703573.pdf:10 ke.txt:5364 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問１ 電子的調剤情報連携体制整備加算の施設基準において、「電子処方箋を受け付け、当該電子処方箋により調剤する体制を有する」こととされているが、電子処方箋の機能が拡張された場合について、どのように考えればよいか。</p></div>
<!-- 001703573.pdf:10 ke.txt:5368 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、令和５年１月26日から稼働した基本機能（電子処方箋の発行・応需（処方・調剤情報の登録を含む。）、処方・調剤情報の閲覧、重複投与・併用禁忌のチェック）に対応した電子処方箋を発行できる体制を有していればよい。（別添４）</p>
