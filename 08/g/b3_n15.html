<!-- 001693874.pdf:8 ke.txt:3949 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問４ 「Ｍ００３－２暫間歯冠補綴装置」の留意事項通知（１）について、<br>①同一欠損部位に対する当該項目の再度の算定について、「ロ」の歯周治<br>療用装置の再製作を除き、「ニ」の歯科用暫間被覆冠成形品を算定後に、<br>「イ」のリテーナーを算定する場合に限り、算定可能か。<br>②「ニ」の歯科用暫間被覆冠成形品の使用時に、固定源である欠損部の両<br>隣在歯に動揺が生じており連結固定が必要な場合は、固定源の歯につい<br>て、「Ｉ０１４  暫間固定」の算定は可能か。<br></p></div>
<!-- 001693874.pdf:8 ke.txt:3956 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） ①そのとおり<br>②算定可能<br></p>
