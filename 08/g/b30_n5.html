<div id='content'>
<!-- 001707505.pdf:4 ke.txt:5522 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問７ 医師事務作業補助体制加算において、ＩＣＴ機器を活用する場合の医師事務作業補助者の算入方法について、どのように配置人数を考えればよいか。</p></div>
<!-- 001707505.pdf:4 ke.txt:5525 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 例えば、90床の一般病床を持つ医療機関において、15対１補助体制加算を届け出ている場合であって、ＩＣＴ機器のうち、生成ＡＩを活用した文書作成補助システムのみを組織的に導入している場合には、医師事務作業補助者１人を 1.2 人として配置人数に算入可能であるため、５人の医師事務作業補助者を配置することで、90 床に対して 15 対１補助体制加算として必要な６人の配置基準を満たすことができる。</p>
