<!-- 001689076.pdf:80 ke.txt:3372 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問４ 「Ｂ００１－３」歯周病患者画像活用指導料について、「注１」及び「注<br>２」に「区分番号Ｄ００２に掲げる歯周病検査を実施する場合において」とあ<br>るが、歯周病検査の実施日以降に行う必要があるのか。<br></p></div>
<!-- 001689076.pdf:80 ke.txt:3375 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） そのとおり。<br>なお、これに伴い、「疑義解釈資料の送付について（その５）」（平成30年7月<br>10日事務連絡）別添２の問８は廃止する。<br></p>
