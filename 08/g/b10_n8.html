<div id='content'>
<!-- 001689076.pdf:88 ke.txt:3623 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 21 調剤を実施し、後日、かかりつけ薬剤師フォローアップ加算に係る業務を行い、同一保険薬局で再度処方箋を受け付けた際、当該患者のかかりつけ薬剤師が不在であった場合も、かかりつけ薬剤師フォローアップ加算を算定可能であるか。</p></div>
<!-- 001689076.pdf:88 ke.txt:3627 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 算定可能。ただし、服薬管理指導料１のロ又は２のロと併せて算定する際には、電話等によりフォローアップした旨及び日時、実施した聞き取りや指導等の内容等に加え、かかりつけ薬剤師の氏名を薬剤服用歴等に記載すること。</p>
