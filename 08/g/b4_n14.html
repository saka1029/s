<div id='content'>
<!-- 001707505.pdf:16 ke.txt:5924 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問４ 内服薬が長期処方（28日分以上）されている患者であって、残薬の状況<br>が確認されたものにおいて、処方医に対して照会を行い調剤日数の変更が<br>行われる又は処方箋の「調剤する薬剤を減量した上で保険医療機関に情報<br>提供」の欄にその旨の指示があり、減数調剤を行うことにより、実際の調<br>剤する内服薬の投与日数が27日分以下となった場合、調剤管理料の１の<br>イ（長期処方（28日分以上））又はロ（イ以外の場合）のいずれを算定す<br>べきであるか。<br></p></div>
<!-- 001707505.pdf:16 ke.txt:5931 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 調剤管理料の１のイを算定する。<br></p>
