<!-- 001712853.pdf:10 ke.txt:6364 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 19 「Ｋ１７８－４」経皮的脳血栓回収術について、算定留意事項通知に<br>ある「関係学会の定める診療に関する指針」とは具体的に何か。<br></p></div>
<!-- 001712853.pdf:10 ke.txt:6366 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本脳卒中学会、日本脳神経外科学会、日本脳神経血管内<br>治療学会の「経皮経管的脳血栓回収用機器  適正使用指針」及び「機械的<br>脳血栓回収療法と頚動脈ステント留置術の併用に関するステートメント」<br>を指す。<br></p>
