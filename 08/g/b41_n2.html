<!-- 001716069.pdf:10 ke.txt:6746 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問２ 「疑義解釈資料の送付について（その１）」（令和８年３月23日事務連絡）別添３の問６において、当該指導料の施設基準に規定する研修の主催団体が例示されているが、歯科大学等の医育機関は研修の主催団体に含まれるのか。</p></div>
<!-- 001716069.pdf:10 ke.txt:6750 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 定期的に学術研修を実施している医育機関が設置する学会は、含まれる。</p>
