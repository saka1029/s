<!-- 001678310.pdf:9 ke.txt:273 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 25 「Ａ２５２」地域医療体制確保加算２の施設基準において「各特定診療科の術前術後の管理等に携わる看護職員について集中治療、術後疼痛管理、呼吸ケア等、特定診療科に係る適切な研修を修了した者がいること。」とされているが、特定診療科において病棟業務に携わる看護職員に適切な研修を修了した者がいる場合も含まれるか。</p></div>
<!-- 001678310.pdf:9 ke.txt:278 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 含まれる。</p>
