</pre></div>
<!-- 001689076.pdf:38 ke.txt:2036 --><pre>（答） 現時点では、日本心不全学会、日本心臓病学会、日本心エコー図学会、

       環器学会の「弁尖間クリッピング式の経皮的三尖弁接合不全修復システム
       に関する適正使用指針」を指す。
