<h1 class='title'>医科診療報酬点数表関係<br>【特定薬剤治療環境特別加算】</h1>
<div id='content'>
<!-- 001703573.pdf:3 ke.txt:5136 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問６ 特定薬剤治療環境特別加算において、「対象となる者は、遺伝子組換え生物等の使用等の規制による生物の多様性の確保に関する法律（以下「カルタヘナ法」という。）に基づく管理が必要なものとして薬事承認を得ている薬剤を使用する目的で、個室に入院した者」とあるが、当該対象薬剤の投与を行う目的で個室に入院したものの、当該薬剤を投与できなかった場合に、特定薬剤治療環境特別加算の算定は可能か。</p></div>
<!-- 001703573.pdf:3 ke.txt:5142 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 当該対象薬剤の投与を行う目的で個室に入室した投与予定日のみ算定可能。その際、投与中止に至った経緯・理由を摘要欄に記載すること。</p>
