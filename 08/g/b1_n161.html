<h1 class='title'>医科診療報酬点数表関係<br>【リハビリテーション通則】</h1>
<div id='content'>
<!-- 001712853.pdf:7 ke.txt:6271 --><div class='rbox'><pre>問 12 「診療報酬の算定方法の一部改正に伴う実施上の留意事項について（通
      知）（令和８年３月５日保医発 0305 第６号）」第７部リハビリテーション
      通則４において、「リハビリテーション実施計画書の写しに説明日及び説
      明者の記載がない場合は、診療録に記載すること」とされているが、医師
      以外の職種が説明を行った場合はどのように記載すればよいか。
</pre></div>
<!-- 001712853.pdf:7 ke.txt:6276 --><pre>（答） 医師以外の職種が説明を行った場合は、診療記録のうち診療録以外の部
       分に記載して差し支えない。
</pre>
