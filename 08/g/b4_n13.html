<!-- 001698587.pdf:15 ke.txt:5002 --><div class='rbox'><pre>問２ 小児におけるアナフィラキシーに対して用いるアドレナリン点鼻液（ネ
     フィー点鼻液１mg 及びネフィー点鼻液２mg）について、一度に複数瓶を
     調剤することは可能か。
</pre></div>
<!-- 001698587.pdf:15 ke.txt:5005 --><pre>（答） 可能。添付文書の特効果不十分な場合には、1 回目の投与から 10 分以降
       を目安に、2 回目の投与ができる。」という記載に鑑みて、原則として２瓶
       まで認められる。
</pre>
