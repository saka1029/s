<!-- 001689076.pdf:31 ke.txt:1794 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 96 「「血液製剤の使用指針」の一部改正について｣（平成31年３月25日付<br>け薬生発第0325第１号厚生労働省医薬・生活衛生局長通知）及び｢「輸血療<br>法の実施に関する指針」の一部改正について｣（令和２年３月31日付け薬生<br>発0331第31号厚生労働省医薬・生活衛生局長通知）で示されている「血液<br>製剤の使用指針」及び「輸血療法の実施に関する指針」が廃止されるが、代<br>わりとなる指針等はあるか。<br></p></div>
<!-- 001689076.pdf:31 ke.txt:1800 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 日本輸血・細胞治療学会の「輸血療法実践ガイド」を参照すること。<br></p>
