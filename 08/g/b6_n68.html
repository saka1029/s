<!-- 001689076.pdf:35 ke.txt:1920 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 115 「Ｋ０５３－３」悪性腫瘍、類骨骨腫及び四肢軟部腫瘍凝固・焼灼術（冷凍凝固によるもの）における「関連学会の定める適正使用指針」とは、具体的に何を指すのか。</p></div>
<!-- 001689076.pdf:35 ke.txt:1923 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本癌治療学会、日本臨床腫瘍学会、日本緩和医療学会、日本 IVR 学会の「経皮的凍結療法適応拡大  適正使用指針」を指す。</p>
