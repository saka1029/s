<!-- 001698587.pdf:14 ke.txt:4972 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問３ 令和８年度診療報酬改定において、新製有床義歯管理料の取扱いが見直されたが、令和８年５月末までに新製有床義歯管理料を算定し、６月を超えない期間で新たに別の新製有床義歯に関する取扱いの説明等を行った場合の取扱い如何。</p></div>
<!-- 001698587.pdf:14 ke.txt:4976 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 新製有床義歯管理料を再度算定して差し支えない。</p>
