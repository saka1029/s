<div id='content'>
<!-- 001689076.pdf:25 ke.txt:1563 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 74 「Ａ２３０－５」精神科慢性身体合併症管理加算について、「この場合において、区分番号Ａ２３０－３に掲げる精神科身体合併症管理加算は別に算定できない。」とあるが、精神科慢性身体合併症管理加算に係る診察に併せて精神科身体合併症管理加算に係る診療を行った場合、「精神科身体合併症管理加算」は算定できるのか。</p></div>
<!-- 001689076.pdf:25 ke.txt:1568 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 算定できない。なお、「精神科慢性身体合併症管理加算」に係る診察を行った日とは別の日に「精神科身体合併症管理加算」に係る診療を行った場合は、「精神科身体合併症管理加算」を算定できる。</p>
