<!-- 001703573.pdf:3 ke.txt:5145 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問７ 精神科リエゾンチーム加算は週１回に限り所定点数に加算することとされているが、「１ 認知症又はせん妄の場合」と「２ それ以外の場合」のそれぞれを週１回算定できるのか、両者のうちいずれかを週１回算定できるのか。</p></div>
<!-- 001703573.pdf:3 ke.txt:5149 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） １と２のいずれか一方を週１回に限り算定することができる。</p>
