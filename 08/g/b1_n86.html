<!-- 001689076.pdf:35 ke.txt:1932 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 117 「Ｋ６４５－４」骨盤内悪性腫瘍及び腹腔内軟部腫瘍凝固・焼灼術（冷<br>凍凝固によるもの）における「関連学会の定める適正使用指針」とは、具体<br>的に何を指すのか。<br></p></div>
<!-- 001689076.pdf:35 ke.txt:1935 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本癌治療学会、日本臨床腫瘍学会、日本緩和医療学会、<br>日本IVR学会の「経皮的凍結療法適応拡大  適正使用指針」を指す。<br></p>
