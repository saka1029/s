<!-- 001698587.pdf:8 ke.txt:4814 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 21 小児におけるアナフィラキシーに対して用いるアドレナリン点鼻液<br>（ネフィー点鼻液１mg及びネフィー点鼻液２mg）について、一度に複数<br>瓶を処方することは可能か。<br></p></div>
<!-- 001698587.pdf:8 ke.txt:4817 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 可能。添付文書の「効果不十分な場合には、1回目の投与から10分以降<br>を目安に、2回目の投与ができる。」という記載に鑑みて、原則として２瓶<br>まで認められる。<br></p>
