<div id='content'>
<!-- 001689076.pdf:18 ke.txt:1311 --><div class='rbox'><pre>問 53 令和８年５月 31 日以前からＤＰＣ対象病院に入院している患者に対し
      て、短期滞在手術等基本料３の対象手術等を実施し、当該患者が同年６月１
      日以降に退院した場合、短期滞在手術等基本料３を算定できるか。
</pre></div>
<!-- 001689076.pdf:18 ke.txt:1314 --><pre>（答） 令和８年５月 31 日以前から DPC対象病院に入院している患者については、
       短期滞在手術等基本料３は算定しない。
</pre>
