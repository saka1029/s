<!-- 001689076.pdf:33 ke.txt:1854 --><div class='rbox'><pre>問 105 既に画像診断管理加算２の施設基準の届出を行っている医療機関にお
       いて、画像診断管理加算２（一部委託を行う場合）を算定する場合、改めて
       画像診断管理加算２の施設基準の届出を行う必要があるか。
</pre></div>
<!-- 001689076.pdf:33 ke.txt:1857 --><pre>（答） 改めて画像診断管理加算２の施設基準の届出を行う必要はない。なお、
       遠隔画像診断を行う場合は、遠隔画像診断の施設基準の届出を行う必要が
       ある。
</pre>
