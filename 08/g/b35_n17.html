<!-- 001712853.pdf:10 ke.txt:6379 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 21 特定保険医療材料の機能区分「217  前立腺組織用水蒸気デリバリーシステム」における「関連学会が定める適正使用指針」とは、具体的に何を指すのか。</p></div>
<!-- 001712853.pdf:10 ke.txt:6382 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本泌尿器科学会、日本排尿機能学会、日本泌尿器内視鏡・ロボティクス学会の定める「経尿道的水蒸気治療に関する適正使用指針（第２版）」を指す。（別添２）</p>
