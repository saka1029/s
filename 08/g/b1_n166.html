<!-- 001712853.pdf:10 ke.txt:6371 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 20 「Ｋ６１５」血栓塞栓術について、算定留意事項通知にある「関係学会の定める適正使用指針及び診療ガイドライン」とは具体的に何か。</p></div>
<!-- 001712853.pdf:10 ke.txt:6373 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本脳神経血管内治療学会、日本脳神経外科学会、日本ＩＶＲ学会の「脳神経領域における液体塞栓物質  適正使用指針」、日本脳神経外科学会、日本脳神経外傷学会、日本脳神経血管内治療学会の「頭部外傷ガイドライン」及び「慢性硬膜下血腫に対する中硬膜動脈塞栓術（MMAE）の適正使用に関するステートメント」を指す。</p>
