<div id='content'>
<!-- 001689076.pdf:27 ke.txt:1634 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 80 「Ａ３１１」精神科救急急性期医療入院料の施設基準において、「当該病棟の年間の新規患者のうち６割以上が、「精神科救急等病棟必要性チェックリスト」において３点以上のものであること。」とあるが、年間の取扱い如何。</p></div>
<!-- 001689076.pdf:27 ke.txt:1638 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 届出時は、届出前直近１年間を指す。それ以降は、毎年８月に、前年８月から７月までの 12 か月の実績を算出し基準を満たす必要がある。なお、「Ａ３１１ー３」精神科救急・合併症入院料の施設基準通知（13）においても同様の取扱いとする。</p>
