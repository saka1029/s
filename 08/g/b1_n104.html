<!-- 001689076.pdf:39 ke.txt:2069 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 138 特定保険医療材料の機能区分「133」血管内手術用カテーテルの大動脈<br>分岐部用フィルターセットにおける「関連学会の定める適正使用指針」とは、<br>具体的に何を指すのか。<br></p></div>
<!-- 001689076.pdf:39 ke.txt:2072 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、経カテーテル的心臓弁治療関連学会協議会の「脳塞栓保護<br>システムの適正使用に係る指針」を指す。<br></p>
