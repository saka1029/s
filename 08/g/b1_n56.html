<!-- 001689076.pdf:25 ke.txt:1572 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 75 「Ａ２４９」精神科急性期医師配置加算１の施設基準において、「入院又<br>は外来においてクロザピンを使用する患者数が年間に６人以上であるこ<br>と。」とあるが、入院及び外来でクロザピンを使用する1人の患者は、当該<br>要件において２人とカウントすることは可能か。<br></p></div>
<!-- 001689076.pdf:25 ke.txt:1576 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 不可。なお、精神科急性期医師配置加算３の施設基準においても同様の<br>取扱いである。<br></p>
