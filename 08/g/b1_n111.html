<h1 class='title'>医科診療報酬点数表関係<br>【後発医薬品使用体制加算等】</h1>
<div id='content'>
<!-- 001693874.pdf:3 ke.txt:3795 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問６ 令和８年度診療報酬改定の内容を適用する前の、後発医薬品使用体制加算<br>等の施設基準においては、前月までの実績を用いて届け出ることとされてい<br>るが、令和８年５月１日に、５月に適用する後発医薬品使用体制加算等の届<br>出をする場合、４月実績のカットオフ値はどのように算出すればよいか。<br></p></div>
<!-- 001693874.pdf:3 ke.txt:3799 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 令和８年５月１日に、５月に適用する後発医薬品使用体制加算等の届出<br>をする場合に限り、カットオフ値の算出については令和８年３月までの実<br>績を用いることとし、４月実績は用いないこと。<br></p>
