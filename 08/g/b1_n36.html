<h1 class='title'>医科診療報酬点数表関係<br>【入院料等】</h1>
<div id='content'>
<!-- 001689076.pdf:7 ke.txt:929 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 22 第２部入院料等の通則５（２）において、「短期滞在手術等基本料３、医<br>学管理等（診療情報提供料を除く。）、在宅医療、投薬、注射（当該専門的な<br>診療に特有な薬剤を用いた受診日の投薬又は注射に係る費用を除き、処方<br>料、処方箋料及び外来化学療法加算を含む。）及びリハビリテーション（言<br>語聴覚療法に係る疾患別リハビリテーション料を除く。）に係る費用は算定<br>できない。」とあるが、この「診療情報提供料」は何を指すのか。<br></p></div>
<!-- 001689076.pdf:8 ke.txt:937 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 「Ｂ００９」診療情報提供料(Ⅰ)、「Ｂ０１０」診療情報提供料(Ⅱ)及び<br>「Ｂ０１１」連携強化診療情報提供料を指す。<br></p>
