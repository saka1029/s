<!-- 001689076.pdf:38 ke.txt:2024 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 131 特定保険医療材料の機能区分「237」軟骨修復材における「関連学会の<br>定める適正使用指針」とは、具体的に何を指すのか。<br></p></div>
<!-- 001689076.pdf:38 ke.txt:2026 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本スポーツ整形外科学会の「医療機器「軟骨修復材 モチ<br>ジェル」の適正使用に関して」を指す。<br></p>
