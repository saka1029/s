<!-- 001689076.pdf:40 ke.txt:2098 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 142 特定保険医療材料の機能区分「146」大動脈用ステントグラフトの腹部<br>大動脈用ステントグラフト（メイン部分）・分枝血管部分連結型を使用する<br>に当たって参照すべき基準はあるか。<br></p></div>
<!-- 001689076.pdf:40 ke.txt:2101 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本ステントグラフト実施基準管理委員会の「腹部大動脈<br>瘤ステントグラフト  実施基準」が該当する。<br></p>
