<!-- 001693874.pdf:9 ke.txt:3975 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問６ 鋳鉤、線鉤、コンビネーション鉤及び大連結子について、歯科用貴金属<br>を使用する特段の理由がある場合は、使用した理由を診療録に記載するこ<br>ととされているが、どのような理由が該当するのか。<br></p></div>
<!-- 001693874.pdf:9 ke.txt:3978 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 例えば、鉤歯の状態により、歯科用貴金属でなければ鉤の破折が起こり得<br>る等の歯科医学的な理由が該当する。<br></p>
