<!-- 001693874.pdf:3 ke.txt:3787 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問５ 「Ａ２４４」病棟薬剤業務実施加算１の施設基準において、「「Ｂ０１４」退院時薬剤情報管理指導料の算定割合が、直近３か月間で退院患者のうち４割以上であること」とあるが、「退院患者」について、退院時薬剤情報管理指導料の算定対象とならない入院料を算定している患者、医科点数表の第１章第２部通則６に規定する入院期間が通算される再入院の患者及び死亡退院の患者は、除外してよいか。</p></div>
<!-- 001693874.pdf:3 ke.txt:3793 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） よい。</p>
