<div id='content'>
<!-- 001703573.pdf:5 ke.txt:5233 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 14 「Ｂ００７」退院前訪問指導料について、患家の訪問中に、当該患者又はその家族等に対して退院後の在宅での療養上必要と考えられる指導を行った時間とは別の時間に疾患別リハビリテーションを実施した場合、退院前訪問指導料とは別に疾患別リハビリテーション料を算定することは可能か。</p></div>
<!-- 001703573.pdf:6 ke.txt:5240 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 算定可能。ただし、医療機関外で実施できる疾患別リハビリテーション料の算定上限単位数を超えないこと。</p>
