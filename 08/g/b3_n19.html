<!-- 001716069.pdf:10 ke.txt:6740 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問１ 令和８年度診療報酬改定において、対象患者に「連続した３歯以上の先<br>天性欠如歯に起因した咬合異常が認められる患者（18歳未満の患者に限<br>る。）」が追加されたが、広範囲顎骨支持型補綴診断料の算定時に18歳未<br>満であれば、当該手術の対象となるか。<br></p></div>
<!-- 001716069.pdf:10 ke.txt:6744 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 対象となる。<br></p>
