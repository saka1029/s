<div id='content'>
<!-- 001698587.pdf:3 ke.txt:4608 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問５ 区分番号「Ａ２４４」病棟薬剤業務実施加算について、病棟ごとに「病棟薬剤業務実施加算１」又は「病棟薬剤業務実施加算２」を分けて届け出ることは可能か。</p></div>
<!-- 001698587.pdf:3 ke.txt:4611 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 不可。「病棟薬剤業務実施加算１」の実績要件については保険医療機関全体で満たす必要があり、保険医療機関として「病棟薬剤業務実施加算１」又は「病棟薬剤業務実施加算２」のどちらかしか届出できない。なお、「病棟薬剤業務実施加算３」は、「病棟薬剤業務実施加算１」又は「病棟薬剤業務実施加算２」とは別に届出することが可能である。</p>
