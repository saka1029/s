<div id='content'>
<!-- 001678310.pdf:17 ke.txt:536 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問３ 当該評価料の収入を用いた賃金改善の対象職員からは、「事業主、使用者、開設者、管理者、40 歳以上の薬剤師及び業務委託により勤務する者を除く」とのことであるが、管理薬剤師は対象となるか。</p></div>
<!-- 001678310.pdf:17 ke.txt:539 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 対象とならない。（別添３）</p>
