<h1 class='title'>医科診療報酬点数表関係<br>【遺伝性疾患療養指導管理料】</h1>
<div id='content'>
<!-- 001689076.pdf:19 ke.txt:1354 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 59 令和８年度診療報酬改定において、検体検査判断料の「遺伝カウ<br>遺伝性疾患療養指導管理料」が新設されたが、その趣旨如何。<br></p></div>
<!-- 001689076.pdf:19 ke.txt:1357 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 関係学会による医療技術評価の提案を契機とし、質の高いゲノム医<br>療を推進する観点から、遺伝カウンセリング及び遺伝学的な情報に基<br>づく療養指導に係る評価について議論され、見直しが行われたもの。<br>これにより、遺伝学的検査等の実施時だけではなく、必要な場面にお<br>いて、適切な時期に、質の高い医学管理が実施されることが期待され<br>る。<br></p>
