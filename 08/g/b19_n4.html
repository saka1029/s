<div id='content'>
<!-- 001698587.pdf:2 ke.txt:4597 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問４ 「Ａ２３３－３」口腔管理連携加算の施設基準の要件である前年度の実績について、「ア  入院中の患者に対し、連携歯科医療機関から歯科訪問診療を受けた実績が３件以上」及び「イ  退院時に「Ｂ００９」の注 14に規定する歯科医療機関連携加算１を算定した実績が３件以上」には、当該保険医療機関と特別の関係にある歯科医療機関に係る実績を含めて良いか。</p></div>
<!-- 001698587.pdf:3 ke.txt:4605 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 特別の関係にある歯科医療機関については、いずれの要件についても実績件数に含めない。</p>
