      地域で策定されており、当該プロトコルどおりに薬剤調整した後に事後報
      告のみで差し支えないと定められている場合、当該調整について薬学的有
      害事象等防止加算を算定することができるか。
</pre></div>
<!-- 001689076.pdf:86 ke.txt:3552 --><pre>（答） 薬学的有害事象等防止加算は疑義照会に係る対応を評価するものである
       ため、算定不可。
