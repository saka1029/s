<!-- 001698587.pdf:6 ke.txt:4729 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 15 「Ｄ２１７」骨塩定量検査について、令和８年５月に算定した場合、①４月に１回算定する場合に、次回、算定可能となるのはいつか。②１年に１回算定する場合に、次回、算定可能となるのはいつか。</p></div>
<!-- 001698587.pdf:6 ke.txt:4732 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） ①令和８年９月以降算定可能となる。②令和９年５月以降算定可能となる。</p>
