<!-- 001678310.pdf:20 ke.txt:632 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問２ 令和８年５月31日時点で既に医療ＤＸ推進体制整備加算の施設基準を届け出ている保険薬局は、令和８年度診療報酬改定に係る見直しに伴い、同年６月１日からの電子的調剤情報連携体制整備加算の算定にあたり、電子的調剤情報連携体制整備加算に係る施設基準の届出を改めて行う必要があるか。</p></div>
<!-- 001678310.pdf:20 ke.txt:637 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 不要である。（別添５）</p>
