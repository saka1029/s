<!-- 001689076.pdf:33 ke.txt:1876 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 108 「Ｄ０１２」感染症免疫学的検査の「52」赤痢アメーバ抗体半定量、赤痢アメーバ抗原定性、赤痢アメーバ抗体定性における「関連学会の定める適正使用指針」とは、具体的に何を指すのか。</p></div>
<!-- 001689076.pdf:33 ke.txt:1879 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本エイズ学会、日本寄生虫学会、日本熱帯医学会、日本感染症学会、日本臨床微生物学会の「血清赤痢アメーバ抗体検査薬の適正使用について」を指す。</p>
