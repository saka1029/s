<!-- 001689076.pdf:37 ke.txt:2011 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 129 特定保険医療材料の機能区分「231」消化器用瘻孔形成ドレナージステ<br>ントにおける「関連学会の定める適正使用指針」とは、具体的に何を指すの<br>か。<br></p></div>
<!-- 001689076.pdf:37 ke.txt:2014 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本消化器内視鏡学会、日本消化器病学会、日本膵臓学会<br>の「医療機器「Hot AXIOSシステム」の適正使用指針」を指す。<br></p>
