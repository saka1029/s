<div id='content'>
<!-- 001707505.pdf:9 ke.txt:5713 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 21 在宅医療充実体制加算の施設基準における「訪問診療を担当する時間について常勤換算した医師数１人当たりの、当該保険医療機関において訪問診療を実施する患者の実人数」の要件について、算出の対象とする期間はどのように考えればよいか。</p></div>
<!-- 001707505.pdf:9 ke.txt:5717 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 届出前１か月とする。なお、届出の３か月前から前月までの直近３か月において、月ごとに算出した値の平均値を用いても良い。</p>
