<div id='content'>
<!-- 001689076.pdf:21 ke.txt:1408 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 65 第２部在宅医療第１節又は第２節の所定点数を算定し、在宅において患<br>者が自己注射を行う薬剤について院内処方を行った場合に、「Ｆ０００」調<br>剤料、「Ｆ１００」処方料、「Ｆ２００」薬剤及び「Ｆ５００」調剤技術基本<br>料は算定できるのか。<br></p></div>
<!-- 001689076.pdf:21 ke.txt:1412 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 当該薬剤のみを処方する場合には、算定不可。当該薬剤の費用について<br>は、「Ｃ２００」薬剤により算定する。なお、当該薬剤以外を併せて処方す<br>る場合においては、それぞれ「Ｆ０００」調剤料、「Ｆ１００」処方料、「Ｆ<br>２００」薬剤及び「Ｆ５００」調剤技術基本料の算定要件等に従い、別途<br>算定できる。<br></p>
</div>
