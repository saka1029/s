<!-- 001716069.pdf:5 ke.txt:6654 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問９ 同一手術野又は同一病巣に係る手術において、２種類以上の手術を同時に行った場合に、外科医療確保特別加算の対象手術が従たる手術として所定点数の 100 分の 50 を算定する場合、当該対象手術に対する当該加算の点数はどのように考えればよいか。</p></div>
<!-- 001716069.pdf:5 ke.txt:6658 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 外科医療確保特別加算の対象手術の所定点数の100分の50に相当する点数の、100 分の 15 に相当する点数を加算することとなる。</p>
