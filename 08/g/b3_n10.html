<!-- 001689076.pdf:81 ke.txt:3393 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問７ 算定留意事項通知の「Ｂ００１－２」歯科衛生実地指導料の留意事項通知（３）、「Ｂ００１－２－２」口腔機能実地指導料の留意事項通知（２）及び「Ｃ００１」訪問歯科衛生指導料の留意事項通知（９）において、患者に提供する文書に当該指導を行った歯科衛生士の氏名を記載することとされているが、必ず姓名双方の記載が必要なのか。</p></div>
<!-- 001689076.pdf:81 ke.txt:3398 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） カスタマーハラスメントの防止等の観点から、名字のみの記載とすることは可能。なお、これに伴い、「疑義解釈資料の送付について（その２）」（令和６年４月 12 日事務連絡）別添３の問 12 は廃止する。</p>
