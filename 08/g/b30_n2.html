<div id='content'>
<!-- 001707505.pdf:3 ke.txt:5472 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問４ 精神病棟入院基本料の注７、特定機能病院入院基本料の注11及び精神科急性期治療病棟入院料の注４に規定する精神病棟看護・多職種協働加算の施設基準において「当該病棟において、作業療法士、精神保健福祉士又は公認心理師の数は、一以上であること。」とされているが、常勤換算で１名以上の配置が必要なのか。</p></div>
<!-- 001707505.pdf:3 ke.txt:5477 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 様式９の勤務実績表に記載され、精神病棟看護・多職種協働加算の当該月の勤務実績がある職員（勤務時間数を問わない）として、作業療法士、精神保健福祉士又は公認心理師が１名以上いればよい。</p>
