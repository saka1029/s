<div id='content'>
<!-- 001689076.pdf:80 ke.txt:3365 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問３ 「Ｂ０００－４」歯科疾患管理料について、令和８年度診療報酬改定に<br>おいて、有床義歯に係る治療のみを行う患者に対しても算定可能とされた<br>が、傷病名がＭＴや義歯不適合（義歯フテキ）等の有床義歯に係る病名の<br>みの場合も算定可能か。<br></p></div>
<!-- 001689076.pdf:80 ke.txt:3369 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 算定可能。なお、これに伴い「疑義解釈資料の送付について（その７)」<br>（平成21年１月28日事務連絡）別添の問２は廃止する。<br></p>
