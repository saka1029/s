<!-- 001689076.pdf:36 ke.txt:1958 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 121 「Ｋ５５９－４」経カテーテル弁周囲欠損孔閉鎖術における「関連学会<br>の定める適正使用指針」とは、具体的に何を指すのか。<br></p></div>
<!-- 001689076.pdf:36 ke.txt:1960 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、人工弁周囲逆流研究会の「弁周囲逆流閉鎖セット適正使用<br>指針」を指す。<br></p>
