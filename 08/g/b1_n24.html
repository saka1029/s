<!-- 001678310.pdf:12 ke.txt:398 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 38 令和８年度診療報酬改定において、休日リハビリテーション加算が新設されるとともに、週当たりにおける療法士の上限単位数が 108 単位であることが改めて示されたが、１週間の単位は、第１部初・再診料通則で定める単位と同様か。</p></div>
<!-- 001678310.pdf:12 ke.txt:402 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） そのとおり。日曜日から土曜日までを週の単位とする。</p>
