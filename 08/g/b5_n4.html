<h1 class='title'>訪問看護療養費関係<br>【特掲診療料の施設基準等の別表第８に該当する者】</h1>
<div id='content'>
<!-- 001678310.pdf:22 ke.txt:689 --><div class='rbox'><pre>問５ 特掲診療料の施設基準等（平成 20 年厚生労働省告示第 63 号）の別表第
     ８に新たに規定された在宅難治性皮膚疾患処置指導管理を受けている状態
     にある者とは、どのような者が該当するか。
</pre></div>
<!-- 001678310.pdf:22 ke.txt:692 --><pre>（答） 現に医科点数表区分番号「Ｃ１１４」在宅難治性皮膚疾患処置指導管理料
       を算定している利用者が該当するものであり、当該管理料を算定せずに単
       に難治性の皮膚病変を有する利用者は該当しない。
</pre>
</div>
