<div id='content'>
<!-- 001694332.pdf:7 ke.txt:4257 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 15 特定集中治療室管理料及びハイケアユニット入院医療管理料における施<br>設基準について、「全身麻酔の定義は、「Ａ２００」に掲げる急性期総合体制<br>加算における定義と同様である。」とあるが、令和８年５月31日までに実施<br>した全身麻酔による手術件数についても、急性期総合体制加算における定義<br>と同様に、令和８年度改定前の医科点数表第２章第11部に掲げる麻酔のう<br>ち「Ｌ００８」に掲げるマスク又は気管挿管による閉鎖循環式全身麻酔によ<br>る手術件数の実績により届け出ることで差し支えないか。<br></p></div>
<!-- 001694332.pdf:7 ke.txt:4264 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 差し支えない。<br></p>
