<h1 class='title'>訪問看護療養費関係<br>【訪問看護遠隔診療補助料】</h1>
<div id='content'>
<!-- 001689076.pdf:91 ke.txt:3715 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問６ 利用者の居宅へ訪問し予定された訪問看護を実施し、訪問看護計画に基<br>づいた訪問看護を提供している時間帯に、利用者の状態に応じて緊急に情<br>報通信機器を用いた診療を実施した場合に別で訪問看護遠隔診療補助料を<br>算定できるか。<br></p></div>
<!-- 001689076.pdf:91 ke.txt:3719 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 算定不可。訪問看護を実施している時間又はそれと連続する時間帯におい<br>て、情報通信機器を用いた診療の補助を実施した場合には、訪問看護基本療<br>養費又は医科点数表の「Ｃ００５」在宅患者訪問看護・指導料若しくは「Ｃ<br>００５－１－２」同一建物居住者訪問看護・指導料のうち該当するものを算<br>定する。<br></p>
</div>
