<!-- 001689076.pdf:34 ke.txt:1891 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 110 「Ｋ５９９」植込型除細動器移植術の「４」胸骨下植込型リードを用いるものにおける「関連学会の定める基準等」とは、具体的に何を指すのか。</p></div>
<!-- 001689076.pdf:34 ke.txt:1893 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本不整脈心電学会の「Extra-vascular ICD（EV-ICD）の適応・施設要件・術者要件に関するステートメント」を指す。</p>
