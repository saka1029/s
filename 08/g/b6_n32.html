<div id='content'>
<!-- 001689076.pdf:21 ke.txt:1418 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 66 第２部在宅医療第１節又は第２節の所定点数を算定し、在宅において患者が自己注射を行う薬剤について、保険薬局で保険調剤を受けさせるために、患者に院外処方箋を交付した場合に、「Ｆ４００」処方箋料は算定できるのか。</p></div>
<!-- 001689076.pdf:21 ke.txt:1422 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 「Ｃ００２」在宅時医学総合管理料等の、投薬の費用が所定点数に含まれている管理料等を算定する場合を除き、「Ｆ４００」処方箋料を算定可能。ただし、注射器、注射針又はその両者のみを処方箋により投与することは認められない。</p>
