<div id='content'>
<!-- 001689076.pdf:37 ke.txt:1996 --><div class='rbox'><p style='margin-left:3.5em;text-indent:-3.5em'>問 127 特定保険医療材料の機能区分「235」アルコール依存症飲酒量低減治療補助アプリにおける「アルコール依存症に係る適切な研修」とは、具体的には何を指すのか。</p></div>
<!-- 001689076.pdf:37 ke.txt:1999 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、一般社団法人日本アルコール・アディクション医学会及び一般社団法人日本肝臓学会が主催する「アルコール依存症の診断と治療に関する e-ラーニング研修」及び独立行政法人国立病院機構久里浜医療センターが主催する「アルコール依存症臨床医等研修」を指す。</p>
