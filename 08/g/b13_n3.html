<h1 class='title'>看護職員処遇改善評価料及びベースアップ評価料関係<br>【入院基本料等の減算】</h1>
<div id='content'>
<!-- 001693874.pdf:6 ke.txt:3918 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問６ 令和８年３月31日時点で入院ベースアップ評価料を算定していた医療機関が、令和８年６月以降に入院ベースアップ評価料の届出を行わない場合、「医科点数表第１章第２部通則第 11 号及び歯科点数表第１章第２部入院料等通則第９号」に規定する入院基本料等の減算対象となるのか。</p></div>
<!-- 001693874.pdf:7 ke.txt:3924 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 入院基本料等の減算対象とはならない。（別添３）</p>
