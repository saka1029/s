<!-- 001678310.pdf:8 ke.txt:241 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 21 「Ａ２３６」褥瘡ハイリスク患者ケア加算は、重点的な褥瘡ケアが必要な患者に対し、適切な褥瘡予防・治療のための予防治療計画に基づく総合的な褥瘡対策を継続して実施した場合、入院からの日数にかかわらず算定可能か。</p></div>
<!-- 001678310.pdf:8 ke.txt:245 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 算定要件を満たしていれば、入院からの日数にかかわらず褥瘡ハイリスク患者ケア加算を算定可能である。</p>
