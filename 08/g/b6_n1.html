<div id='content'>
<!-- 001689076.pdf:2 ke.txt:716 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問１ 「Ａ０００」電子的診療情報連携体制整備加算の施設基準において、「電子カルテ情報共有サービスとの接続インターフェースを有していること。」とされているが、地域の複数の医療機関間で検査結果や画像情報等を含む診療情報を共有又は閲覧できるネットワークに係る要件を満たす場合について、どのように考えればよいか。</p></div>
<!-- 001689076.pdf:2 ke.txt:721 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 電子的診療情報連携体制整備加算１に関する施設基準のうち、（11）のイ及びウを満たす場合には、「電子カルテ情報共有サービスとの接続インターフェースを有していること。」を満たすものとみなす。</p>
