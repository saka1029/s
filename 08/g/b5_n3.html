<h1 class='title'>訪問看護療養費関係<br>【特掲診療料の施設基準等の別表第７に該当する者】</h1>
<div id='content'>
<!-- 001678310.pdf:22 ke.txt:683 --><div class='rbox'><p style='margin-left:2.5em;text-indent:-2.5em'>問４ 主たる傷病名が「視神経脊髄炎」の利用者は、特掲診療料の施設基準等の<br>別表第７に掲げる別に厚生労働大臣の定める疾病等の「多発性硬化症」に該<br>当すると考えてよいか。また、主たる傷病名が「多巣性運動ニューロパチー」<br>の利用者は、「慢性炎症性脱髄性多発神経炎」に該当すると考えてよいか。<br></p></div>
<!-- 001678310.pdf:22 ke.txt:687 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） いずれもそのとおり。<br></p>
