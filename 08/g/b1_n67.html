<!-- 001689076.pdf:31 ke.txt:1783 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 94 「Ｋ８７９－２」腹腔鏡下子宮悪性腫瘍手術（子宮頸がんに対して内視<br>鏡手術用支援機器を用いる場合）の施設基準について、「関係学会の定める<br>診療に関する指針」とは具体的に何か。<br></p></div>
<!-- 001689076.pdf:31 ke.txt:1786 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 現時点では、日本産科婦人科学会の、「婦人科領域におけるロボット手術<br>に関する指針」を指す。<br></p>
