<div id='content'>
<!-- 001707505.pdf:11 ke.txt:5768 --><div class='rbox'><p style='margin-left:3.0em;text-indent:-3.0em'>問 26 近視の進行抑制を効能又は効果とする医薬品の支給が選定療養の対象<br>とされたところ、当該医薬品に係る特別の料金は患者から徴収するが、薬<br>剤料以外の費用については算定可能か。<br></p></div>
<!-- 001707505.pdf:11 ke.txt:5771 --><p style='margin-left:3.5em;text-indent:-3.5em'>（答） 医科点数表の第２章区分番号Ｆ０００に掲げる調剤料及び区分番号Ｆ５<br>００に掲げる調剤技術基本料並びに調剤点数表の第１節区分番号００に掲<br>げる調剤基本料及び区分番号０１に掲げる薬剤調製料以外については、診<br>療報酬点数表に基づき算定可能。<br></p>
